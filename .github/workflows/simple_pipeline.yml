      # ── tfsec — Azure-specific Terraform security ──────────────────────────
      # BEGINNER: tfsec focuses specifically on Terraform and has deep
      # Azure knowledge. It complements Checkov with different rule sets.
      # Results appear in the GitHub Security tab under "Code scanning".
      #
      # HOW TO SET UP: No secrets needed! Just add this step.
      - name: Run tfsec scan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tfsec . --format sarif --out tfsec-results.sarif
        continue-on-error: true

      - name: Upload tfsec SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.TF_WORKING_DIR }}/tfsec-results.sarif
          category: tfsec

