run-name: Multi-Stage-Infra-Deployment

on:
  push:
    branches:
      - main
      - 'releases/**'
permissions:
  id-token: write
  contents: read
jobs:
  Terraform-init-fmt-validate-plan:
    name: terraform init fmt validate plan
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Hello Greeting
        run: echo "Hello world"


      - name: Azure Login
        uses: Azure/login@v3
        with:
          client-id: c4019192-67d1-4759-ba61-6cfe5fabdc6c
          tenant-id: 33da77e3-b6af-4f43-b5cb-5ffdb75f04d1
          subscription-id: 55e255f2-e37a-47b4-bdc9-8d1f4a8d391c

      - name: Terraform Init
        working-directory: ./environments/dev
        run: terraform init -input=false -no-color
      
      - name: Terraform Format Check
        working-directory: ./environments/dev
        run: terraform fmt -check
      
      - name: Terraform Validate
        working-directory: ./environments/dev
        run: terraform validate
      
      - name: Terraform Plan
        working-directory: ./environments/dev
        run: terraform plan -var-file="terraform.tfvars" -no-color
