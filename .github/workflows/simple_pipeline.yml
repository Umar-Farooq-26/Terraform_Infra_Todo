run-name: "DevSecOps Infra Pipeline — ${{ github.ref_name }} by ${{ github.actor }}"

on:
  push:
    branches:
      - main
      - "releases/**"
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  security-events: write
  pull-requests: write

env:
  TF_WORKING_DIR: ./environments/dev
  TF_VERSION: "1.8.5"
  CHECKOV_VERSION: "3.2.0"

jobs:
  pre-commit-checks:
    name: "🔍 Pre-commit Checks"
    runs-on: self-hosted

    steps:
      # ── Step 1: Download your code ──────────────────────────────────────────
      # BEGINNER: Always the first step. "Checks out" (downloads) your repo
      # files onto the runner machine so other steps can use them.
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 downloads the FULL git history.
          # Gitleaks needs this to scan all commits, not just the latest.
          fetch-depth: 0

            # ── Step 2: Secret Scanning with Gitleaks ───────────────────────────────
      # BEGINNER: Gitleaks scans every file and every git commit looking for
      # accidentally committed secrets like API keys, passwords, connection
      # strings, etc. This MUST run before anything else.
      #
      # HOW TO SET UP:
      #   1. Go to your repo → Settings → Secrets and variables → Actions
      #   2. Add secret: GITLEAKS_LICENSE (get a free key at gitleaks.io)
      #      (Optional — it works without a license for open-source repos)
      - name: Install Gitleaks
        shell: powershell
        run: |
          $path = "$env:USERPROFILE\gitleaks"

          if (Test-Path $path) {
            Remove-Item -Recurse -Force $path
          }

          Invoke-WebRequest `
            -Uri "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_windows_x64.zip" `
            -OutFile "gitleaks.zip"

          Expand-Archive `
            -Path "gitleaks.zip" `
            -DestinationPath $path

          echo "$path" >> $env:GITHUB_PATH

      - name: Run Gitleaks Scan
        shell: powershell
        run: |
          gitleaks detect `
            --source . `
            --verbose `
            --redact
            
        # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}   # uncomment for private repos


      # ── Step 3: Terraform Linting with TFLint ───────────────────────────────
      # BEGINNER: TFLint is like a spell-checker for Terraform. It catches
      # mistakes that `terraform validate` misses, like invalid Azure VM sizes
      # or deprecated resource arguments.
      #
      # HOW TO SET UP:
      #   No secrets needed! Just make sure you have a .tflint.hcl file in
      #   your repo root (see the example config at the bottom of this file).
      # - name: Setup TFLint
      #   uses: terraform-linters/setup-tflint@v4
      #   with:
      #     tflint_version: latest

      # - name: Init TFLint (download Azure plugin)
      #   run: tflint --init
      #   working-directory: ${{ env.TF_WORKING_DIR }}
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        shell: powershell
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tflint --init
          tflint --format compact
        continue-on-error: true

# =============================================================================
# JOB 2 — TERRAFORM PLAN
# PURPOSE: Initialises Terraform and creates a plan showing EXACTLY what
#          changes will happen if we apply. The plan is saved as a file
#          and passed to later jobs.
# =============================================================================
  terraform-plan:
    name: "📋 Terraform Plan"
    runs-on: self-hosted
    # BEGINNER: "needs" means this job waits for pre-flight to finish first.
    # If pre-flight fails, this job is skipped automatically.
    needs: pre-commit-checks

    # BEGINNER: "outputs" lets this job share data with later jobs.
    # Here we share whether there are any Terraform changes to apply.
    outputs:
      tfplan-exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4


      # ── Azure Login via OIDC (no passwords!) ─────────────────────────────────
      # BEGINNER: OIDC is a modern, secure way to log in to Azure without
      # storing a password. GitHub and Azure exchange short-lived tokens instead.
      #
      # HOW TO SET UP (one-time):
      #   1. In Azure Portal → Azure Active Directory → App registrations
      #      → New registration (name it "github-actions-deploy")
      #   2. Go to Certificates & secrets → Federated credentials → Add
      #      Set: Organization=your-org, Repo=your-repo, Entity=Branch, Branch=main
      #   3. Note the Client ID and Tenant ID
      #   4. Go to your Subscription → Access control (IAM) → Add role assignment
      #      Assign "Contributor" role to your App registration
      #   5. Add these 3 secrets to your GitHub repo:
      #      AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
      - name: Azure Login (OIDC)
        uses: Azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Terraform Setup ───────────────────────────────────────────────────────
      # BEGINNER: Installs the specific version of Terraform on the runner.
      # Pinning the version means everyone uses exactly the same one.
      # - name: Setup Terraform
      #   uses: hashicorp/setup-terraform@v3
      #   with:
      #     terraform_version: ${{ env.TF_VERSION }}
      #     terraform_wrapper: true

      # # ── Cache Terraform Plugins ───────────────────────────────────────────────
      # # BEGINNER: Terraform downloads provider plugins (like the Azure provider)
      # # every time. Caching saves them so subsequent runs are much faster.
      # - name: Cache Terraform plugins
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.terraform.d/plugin-cache
      #     key: terraform-plugins-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
      #     restore-keys: |
      #       terraform-plugins-${{ runner.os }}-

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false -reconfigure
        # env:
        #   TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      # ── Terraform Plan (save to file!) ─────────────────────────────────────
      # BEGINNER: -out=tfplan saves the plan to a binary file.
      # The apply job will use this EXACT file — guaranteeing we apply
      # what was reviewed, not a re-planned version.
      # -detailed-exitcode returns:
      #   0 = no changes, 1 = error, 2 = changes pending
      - name: Terraform Plan
        shell: powershell
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan `
            -var-file="terraform.tfvars" `
            -out=tfplan `
            -detailed-exitcode `
            -input=false
        # echo "exitcode=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── Upload the plan file as an artifact ───────────────────────────────────
      # BEGINNER: "Artifacts" are files saved from one job and made available
      # to other jobs (or for humans to download). We save the plan so the
      # apply job can use it exactly as-is.
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 7

      # ── Fail the job if plan errored (exitcode=1) ─────────────────────────
      - name: Check Plan Result
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "❌ Terraform plan failed with an error."
          exit 1

